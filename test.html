        // Function to get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Function to authenticate user
        async function authenticateUser() {
            if (!apiDomain || !userId || !userCode) {
                console.log('Missing authentication parameters');
                return false;
            }

            try {
                // Call authentication endpoint
                const response = await fetch(`${apiDomain}/api/config/usuarios`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                }).then((res) => res.json());

                const users = JSON.parse(atob(response.USR))

                const user = users.find((user) => user.id === userId && user.code === userCode);

                if (user) {
                    isAuthenticated = true;
                    console.log('User authenticated successfully');
                    return true;
                }

                console.log('Authentication failed');
                return false;
            } catch (error) {
                console.error('Authentication error:', error);
                return false;
            }
        }

        // Initialize configuration from URL parameters
        function initializeConfig() {
            apiDomain = getUrlParameter('apiDomain') || '';
            userId = Number(getUrlParameter('userId')) || '';
            userCode = getUrlParameter('code') || '';
            language = getUrlParameter('language') || 'es';

            console.log('Configuration initialized:', {
                apiDomain: apiDomain || 'Not set',
                userId: userId || 'Not set',
                hasCode: !!userCode,
                language: language
            });

            // Authenticate if credentials are provided
            if (apiDomain && userId && userCode) {
                authenticateUser().then(authenticated => {
                    if (authenticated) {
                        updateButtons();
                    }
                });
            }
        }

        // Helper functions for bars
        function getBarColor(type, status) {
            if (type === 'line') {
                switch (status) {
                    case 0: return 'green';
                    case 2: return 'red';
                    case 3: return 'orange';
                    case 4: return 'red';
                    case 6: return 'yellow';
                    case 7: return 'yellow';
                    case 8: return 'yellow';
                    default: return 'green';
                }
            } else {
                switch (status) {
                    case 0: return 'green';
                    case 1: return 'red';
                    case 4: return 'red';
                    case 5: return 'yellow';
                    case 8: return 'yellow';
                    case 9: return 'red';
                    case 12: return 'red';
                    default: return 'green';
                }
            }
        }

        function getBarIcon(type, status) {
            if (type === 'line') {
                switch (status) {
                    case 0: return 'assets/icons/check.svg';
                    case 2: return 'assets/icons/bell.svg';
                    case 3: return 'assets/icons/bell.svg';
                    case 4: return 'assets/icons/bell.svg';
                    case 6: return 'assets/icons/fault.svg';
                    case 7: return 'assets/icons/fault.svg';
                    case 8: return 'assets/icons/disconnect.svg';
                    default: return 'assets/icons/check.svg';
                }
            } else {
                switch (status) {
                    case 0: return 'assets/icons/check.svg';
                    case 1: return 'assets/icons/bell.svg';
                    case 4: return 'assets/icons/bell.svg';
                    case 5: return 'assets/icons/fault.svg';
                    case 8: return 'assets/icons/fault.svg';
                    case 9: return 'assets/icons/bell.svg';
                    case 12: return 'assets/icons/bell.svg';
                    default: return 'assets/icons/check.svg';
                }
            }
        }

        function getBarName(type) {
            return type === 'line'
                ? dictionary.main.bar.line.name[language]
                : dictionary.main.bar.input.name[language];
        }

        function getBarStatus(type, status) {
            if (type === 'line') {
                return dictionary.main.bar.line.status[language][status];
            } else {
                return dictionary.main.bar.input.status[language][status];
            }
        }

        function renderLineBar(bar, type) {
            // Skip if enable !== 1
            if (bar.enable !== 1) return null;

            const barDiv = document.createElement('div');
            barDiv.className = `bar show ${getBarColor(type, bar.status)}`;

            const contentContainer = document.createElement('div');
            contentContainer.className = 'bar-content-container';

            const icon = document.createElement('img');
            icon.className = 'icon';
            icon.src = getBarIcon(type, bar.status);
            icon.alt = '';

            const textDiv = document.createElement('div');
            textDiv.className = 'bar-text';

            const strong = document.createElement('strong');
            strong.textContent = `${getBarName(type)}${bar.number} ${getBarStatus(type, bar.status)}`;

            const aliasDiv = document.createElement('div');
            const aliasSpan = document.createElement('span');
            aliasSpan.textContent = bar.alias;
            aliasDiv.appendChild(aliasSpan);

            textDiv.appendChild(strong);
            textDiv.appendChild(aliasDiv);

            contentContainer.appendChild(icon);
            contentContainer.appendChild(textDiv);
            barDiv.appendChild(contentContainer);

            return barDiv;
        }

        function orderLines(lines) {
            // return lines.sort((a, b) => a.number - b.number);
            const customOrder = { 2: 0, 3: 1, 4: 2, 6: 3, 7: 4, 8: 5, 0: 6 };
            return [...lines].sort((a, b) => (customOrder[a.status] ?? 99) - (customOrder[b.status] ?? 99));
        }

        function orderInputs(inputs) {
            // return inputs.sort((a, b) => a.number - b.number);
            const customOrder = { 12: 0, 9: 1, 1: 2, 4: 3, 5: 4, 0: 5 };
            return [...inputs].sort((a, b) => (customOrder[a.status] ?? 99) - (customOrder[b.status] ?? 99));
        }

        function renderBars(lines, inputs) {
            // Check if bars have changed
            const linesString = JSON.stringify(lines);
            const inputsString = JSON.stringify(inputs);
            
            if (previousLinesData === linesString && previousInputsData === inputsString) {
                return; // No changes, skip update
            }

            const mainContainer = document.querySelector('.bar-container');
            if (!mainContainer) return;

            mainContainer.innerHTML = '';

            if (lines.length === 0 && inputs.length === 0) {
                mainContainer.style.alignItems = 'center';
                mainContainer.style.justifyContent = 'center';
                const title = document.createElement('h3');
                title.className = 'main-header-title';
                title.textContent = dictionary.main.lineAndInputNormalization[language];
                mainContainer.appendChild(title);
            } else {
                mainContainer.style.alignItems = '';
                mainContainer.style.justifyContent = '';

                const sortedLines = orderLines(lines);
                const sortedInputs = orderInputs(inputs);

                sortedLines.forEach(line => {
                    const barElement = renderLineBar(line, 'line');
                    if (barElement) mainContainer.appendChild(barElement);
                });

                sortedInputs.forEach(input => {
                    const barElement = renderLineBar(input, 'input');
                    if (barElement) mainContainer.appendChild(barElement);
                });
            }

            // Save current state
            previousLinesData = linesString;
            previousInputsData = inputsString;
        }

        // Left container icons - conditional rendering
        function createIcon(src, alt) {
            const icon = document.createElement('img');
            icon.className = 'icon';
            icon.src = src;
            icon.alt = alt;
            return icon;
        }

        // Battery icon rendering
        function renderBatteryIcon(battery) {
            const iconContainer = document.createElement('img');
            iconContainer.className = 'icon';

            if (battery === 100) {
                iconContainer.src = 'assets/icons/battery100.svg';
                iconContainer.alt = dictionary.statusBar.battery.percent100[language];
            } else if (battery >= 75) {
                iconContainer.src = 'assets/icons/battery75.svg';
                iconContainer.alt = dictionary.statusBar.battery.percent75[language];
            } else if (battery >= 50) {
                iconContainer.src = 'assets/icons/battery50.svg';
                iconContainer.alt = dictionary.statusBar.battery.percent50[language];
            } else if (battery <= 25 && battery > 1) {
                iconContainer.src = 'assets/icons/battery25.svg';
                iconContainer.alt = dictionary.statusBar.battery.percent25[language];
            } else {
                iconContainer.src = 'assets/icons/batteryfault.svg';
                iconContainer.alt = dictionary.statusBar.battery.fault[language];
            }

            return iconContainer;
        }

        // Power supply icon rendering
        function renderPowerSupplyIcon(powerSupply) {
            const iconContainer = document.createElement('img');
            iconContainer.className = 'icon';

            if (powerSupply) {
                iconContainer.src = 'assets/icons/powersupplynormal.svg';
                iconContainer.alt = dictionary.statusBar.power.normal[language];
            } else {
                iconContainer.src = 'assets/icons/powersupplyfault.svg';
                iconContainer.alt = dictionary.statusBar.power.fault[language];
            }

            return iconContainer;
        }

        // Network icon rendering
        function renderNetworkIcon(network) {
            const iconContainer = document.createElement('img');
            iconContainer.className = 'icon';

            if (network) {
                iconContainer.src = 'assets/icons/networknormal.svg';
                iconContainer.alt = dictionary.statusBar.network.normal[language];

                iconContainer.src = 'assets/icons/networkfault.svg';
                iconContainer.alt = dictionary.statusBar.network.fault[language];
            }

            return iconContainer;
        }

        // Update status bar icons
        function updateStatusBarIcons(barStatusData) {
            // Check if status has changed
            if (previousBarStatusData && JSON.stringify(barStatusData) === JSON.stringify(previousBarStatusData)) {
                return; // No changes, skip update
            }

            // Update left container
            const leftContainer = document.querySelector('.icon-container.left');
            if (leftContainer) {
                leftContainer.innerHTML = '';

                if (barStatusData['ALARMA']) {
                    leftContainer.appendChild(createIcon('assets/icons/bell.svg', dictionary.statusBar.alarm[language]));
                }
                if (barStatusData['FALLA']) {
                    leftContainer.appendChild(createIcon('assets/icons/fault.svg', dictionary.statusBar.fault[language]));
                }
                if (barStatusData['DESCONEXION']) {
                    leftContainer.appendChild(createIcon('assets/icons/disconnect.svg', dictionary.statusBar.disconnect[language]));
                }
                if (barStatusData['TIERRA']) {
                    leftContainer.appendChild(createIcon('assets/icons/groundconnection.svg', dictionary.statusBar.ground[language]));
                }
                if (barStatusData['TEST']) {
                    leftContainer.appendChild(createIcon('assets/icons/test.svg', dictionary.statusBar.test[language]));
                }
                if (barStatusData['EXTINCION']) {
                    leftContainer.appendChild(createIcon('assets/icons/extinction.png', dictionary.statusBar.extinction[language]));
                }
            }

            // Update right container
            const rightContainer = document.querySelector('.icon-container.right');
            if (rightContainer) {
                rightContainer.innerHTML = '';

                rightContainer.appendChild(renderBatteryIcon(barStatusData['BATERIA']));
                rightContainer.appendChild(renderPowerSupplyIcon(barStatusData['ALIMENTACION']));
                rightContainer.appendChild(renderNetworkIcon(barStatusData['RED']));
            }

            // Save current status
            previousBarStatusData = JSON.parse(JSON.stringify(barStatusData));
        }

        // Modal Service - manages modal state
        const modalsService = {
            alert: {
                show: false,
                title: '',
                content: '',
                func: null
            },
            loader: false
        };

        // Show alert modal
        function showAlert(title, content, callback = null) {
            modalsService.alert.title = title;
            modalsService.alert.content = content;
            modalsService.alert.func = callback;
            modalsService.alert.show = true;

            const modal = document.getElementById('alertModal');
            const titleElement = document.getElementById('alertTitle');
            const contentElement = document.getElementById('alertContent');

            if (modal && titleElement && contentElement) {
                titleElement.textContent = title;
                contentElement.textContent = content;
                modal.classList.add('show');
            }
        }

        // Close alert modal
        function closeAlert() {
            if (modalsService.alert.func) {
                modalsService.alert.func();
            }

            modalsService.alert.show = false;
            modalsService.alert.title = '';
            modalsService.alert.content = '';
            modalsService.alert.func = null;

            const modal = document.getElementById('alertModal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        // Show loader modal
        function showLoader(text = null) {
            modalsService.loader = true;
            const loaderText = text || dictionary.modals.loader.header[language];

            const modal = document.getElementById('loaderModal');
            const headerElement = document.getElementById('loaderHeader');

            if (modal && headerElement) {
                headerElement.textContent = loaderText;
                modal.classList.add('show');
            }
        }

        // Hide loader modal
        function hideLoader() {
            modalsService.loader = false;

            const modal = document.getElementById('loaderModal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        // Button functions
        async function acknowledge() {
            try {
                showLoader();

                if (apiDomain) {
                    const response = await fetch(`${apiDomain}/api/cmd`, {
                        headers: { 'Content-Type': 'application/json' },
                        method: 'POST',
                        body: JSON.stringify({ cmdACK: {} })
                    });

                    if (!response.ok) throw new Error('Command failed');
                } else {
                    // Simulate API call delay for demo
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }

                hideLoader();
                showAlert(
                    dictionary.modals.alert.acknowledge.success.header[language],
                    dictionary.modals.alert.acknowledge.success.content[language]
                );
            } catch (error) {
                hideLoader();
                showAlert(
                    dictionary.modals.alert.acknowledge.error.header[language],
                    dictionary.modals.alert.acknowledge.error.content[language]
                );
            }
        }

        function updateButtons() {
            // Update button texts from dictionary
            const acknowledgeBtn = document.getElementById('acknowledgeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const testBtn = document.getElementById('testBtn');

            if (acknowledgeBtn) {
                acknowledgeBtn.querySelector('span').textContent = dictionary.main.buttons.acknowledge[language];
            }
            if (resetBtn) {
                resetBtn.querySelector('span').textContent = dictionary.main.buttons.reset[language];
                resetBtn.disabled = !isAuthenticated;
            }
            if (testBtn) {
                testBtn.querySelector('span').textContent = dictionary.main.buttons.test[language];
                testBtn.disabled = !isAuthenticated;
            }
        }

        // API Functions
        async function fetchBarStatus() {
            if (!apiDomain) {
                console.log('API Domain not configured');
                return null;
            }

            try {
                const response = await fetch(`${apiDomain}/api/barstatus`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    return await response.json();
                }

                console.error('Error fetching bar status');
                return null;
            } catch (error) {
                console.error('Error fetching bar status:', error);
                return null;
            }
        }

        async function fetchLinesStatus() {
            if (!apiDomain) {
                console.log('API Domain not configured');
                return null;
            }

            try {
                const response = await fetch(`${apiDomain}/api/linesstatus`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    return await response.json();
                }

                console.error('Error fetching lines status');
                return null;
            } catch (error) {
                console.error('Error fetching lines status:', error);
                return null;
            }
        }

        async function fetchGeneralConfig() {
            if (!apiDomain) {
                console.log('API Domain not configured');
                return null;
            }

            try {
                const response = await fetch(`${apiDomain}/api/config/general`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    return await response.json();
                }

                console.error('Error fetching general config');
                return null;
            } catch (error) {
                console.error('Error fetching general config:', error);
                return null;
            }
        }

        // Function to load data from API
        async function loadDataFromAPI() {
            // showLoader();

            try {
                const [barStatus, linesStatus, generalConfig] = await Promise.all([
                    fetchBarStatus(),
                    fetchLinesStatus(),
                    fetchGeneralConfig()
                ]);

                if (generalConfig && generalConfig.cfgGeneral && generalConfig.cfgGeneral['NAME']) {
                    const newName = generalConfig.cfgGeneral['NAME'];
                    if (newName !== previousInstallationName) {
                        document.getElementById('generalDataName').textContent = newName;
                        previousInstallationName = newName;
                    }
                }

                if (linesStatus && linesStatus['LINEAS'] && linesStatus['ENTRADAS']) {
                    const lines = linesStatus['LINEAS']
                        .filter((line) => line.status !== 0); // Filter out normal status lines to reduce API noise
                    const inputs = linesStatus['ENTRADAS']
                        .filter((input) => input.status !== 0); // Filter out normal status inputs to reduce API noise

                    if (barStatus && barStatus.barstatus) {
                        updateStatusBarIcons(barStatus.barstatus);
                    }

                    if (lines && inputs) {
                        renderBars(lines, inputs);
                    }
                }

                // hideLoader();
            } catch (error) {
                console.error('Error loading data:', error);
                // hideLoader();
            }
        }

        // Wait for DOM to be loaded before executing
        document.addEventListener('DOMContentLoaded', function () {
            // Initialize configuration from URL parameters
            initializeConfig();

            // Example data (used when API is not configured)
            const installationName = "CDI WIDGET";
            const barStatusData = {
                "ALARMA": true,
                "FALLA": true,
                "DESCONEXION": true,
                "TIERRA": true,
                "TEST": true,
                "BATERIA": 100,
                "ALIMENTACION": true,
                "RED": true,
                "EXTINCION": true,
                "SIREN": true,
                "FIRMWARE": 1000
            };
            const lines = [
                { status: 0, number: 1, alias: 'LINEA 1', enable: 1 },
                { status: 2, number: 2, alias: 'LINEA 2', enable: 1 },
                { status: 3, number: 3, alias: 'LINEA 3', enable: 1 },
                { status: 4, number: 4, alias: 'LINEA 4', enable: 1 },
                { status: 6, number: 5, alias: 'LINEA 5', enable: 1 },
                { status: 7, number: 6, alias: 'LINEA 6', enable: 1 },
                { status: 8, number: 7, alias: 'LINEA 7', enable: 1 },
            ];
            const inputs = [
                { status: 0, number: 1, alias: 'ENTRADA 1', enable: 1 },
                { status: 1, number: 2, alias: 'ENTRADA 2', enable: 1 },
                { status: 4, number: 3, alias: 'ENTRADA 3', enable: 1 },
                { status: 5, number: 4, alias: 'ENTRADA 4', enable: 1 },
                { status: 8, number: 5, alias: 'ENTRADA 5', enable: 1 },
                { status: 9, number: 6, alias: 'ENTRADA 6', enable: 1 },
                { status: 12, number: 7, alias: 'ENTRADA 7', enable: 1 },
            ];

            // Check if API is configured
            if (apiDomain) {
                // Load data from API
                loadDataFromAPI();

                // Set up polling to refresh data every 2,5 seconds
                setInterval(loadDataFromAPI, 2500);
            } else {
                // Use example data
                document.getElementById('generalDataName').textContent = installationName;
                updateStatusBarIcons(barStatusData);
                renderBars(lines, inputs);
            }

            updateButtons();
        });
    </script>

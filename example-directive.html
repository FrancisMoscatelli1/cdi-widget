<!DOCTYPE html>
<html ng-app="myApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDI Widget - Ejemplo de Directiva</title>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <!-- CDI Widget Module y Archivos -->
    <script src="js/cdi-widget.module.js"></script>
    <script src="js/cdi-widget.service.js"></script>
    <script src="js/cdi-widget.controller.js"></script>
    <script src="js/cdi-widget.directive.js"></script>

    <!-- CDI Widget Styles -->
    <link rel="stylesheet" href="css/cdi-widget.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            display: flex;
            gap: 20px;
            padding: 30px;
        }

        .widget-container {
            flex: 1;
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 0;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .widget-container {
                min-height: 500px;
            }
        }
    </style>
</head>

<body>
    <div ng-controller="AppController" class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧩 CDI Widget - AngularJS</h1>
            <p>Usando &lt;cdi-widget&gt; como elemento HTML personalizado</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Widget Container -->
            <div class="widget-container">
                <!-- El widget usando la directiva -->
                <cdi-widget api-domain="{{widgetConfig.apiDomain}}" user-id="{{widgetConfig.userId}}"
                    user-code="{{widgetConfig.userCode}}" language="{{widgetConfig.language}}">
                </cdi-widget>
            </div>
        </div>
    </div>
    <script>
        /**
         * Aplicación principal que usa la directiva CDI Widget
         */
        angular.module('myApp', ['cdiWidget'])
            .controller('AppController', ['$scope', '$timeout', function ($scope, $timeout) {
                // Configuración del widget
                $scope.widgetConfig = {
                    apiDomain: 'http://localhost:3001',
                    userId: 2,
                    userCode: '2222',
                    language: 'es'
                };

                // Aplicar configuración
                $scope.applyConfig = function () {
                    console.log('Widget configurado con:', $scope.widgetConfig);
                };

                // Auto-cargar en inicio
                $timeout(function () {
                    $scope.applyConfig();
                }, 500);
            }]);
    </script>
</body>

</html>
